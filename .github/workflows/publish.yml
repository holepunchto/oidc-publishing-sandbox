name: Publish
on:
  push:
    tags:
      - v*
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
    name: Publish
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - run: npm publish --ignore-scripts
